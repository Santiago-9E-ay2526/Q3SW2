<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Q3 Seatwork 2; Discount Portal</title>
     <link rel="stylesheet" href="styles.css">

      <!-- BOOTSTRAP -->
     <!-- Latest compiled and minified CSS -->
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

     <!-- Latest compiled JavaScript -->
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</head>
<body>
     
     <!-- START OF HEADER -->
     <header>
          <nav class="navbar navbar-expand-sm navbar-dark bg-dark">
          <div class="container-fluid">
               <a class="navbar-brand" href="javascript:void(0)" style="font-size: 17px;">Brightech Services</a>
               <form class="d-flex">
                    <button class="btn btn-primary" type="button">Promo</button>
               </form>
          </div>
     </nav>
     </header>
     <!-- END OF HEADER -->

     <!-- START OF MAIN -->
     <main class="container-fluid" style="padding-bottom: 120px;">
          <div class="container bg-info rounded mt-5">
               <h2>Want a gaming laptop?</h2>
               <p>Enter your budget, and let's find the right one for you!</p>
               <input type="number" id="laptopbudget" class="form-control" placeholder="Enter budget here...">
               
               <div>
                    <button class="btn btn-primary mt-3" onclick="discountButton()">Brand & Discount</button>

                    <button class="btn btn-primary mt-3" onclick="showStoreAndLocationButton()">Store & Location</button>

                    <button class="btn btn-primary mt-3" onclick="window.location.reload()">Refresh</button>

                    <div id="recommendedBrandAndDiscount"></div>
                    <div id="recommendedStoreAndLocation"></div>
               </div>
          </div>
     </main>
     <!-- END OF MAIN -->

     <!-- START OF FOOTER -->
          <footer class="bg-dark text-white py-3 fixed-bottom text-center">
               <p>&copy; 2026 Brightech Services. All rights reserved.</p>
          </footer>
     <!-- END OF FOOTER -->

     <script src="main.js"></script>

</body>
</html>
